<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    
    <!-- Metallic Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="50%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#ca8a04" />
    </linearGradient>

    <!-- Metallic Silver Gradient -->
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Card with Rounded Corners -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Outer Elegant Border -->
  <rect x="24" y="24" width="464" height="464" rx="88" fill="none" stroke="url(#goldGrad)" stroke-width="4" opacity="0.4" />
  
  <!-- Subtle Internal Ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#silverGrad)" stroke-width="1.5" opacity="0.2" />

  <g transform="translate(0, -10)">
    <!-- Scale of Justice / Balance Column -->
    <g id="balance-column" stroke="url(#goldGrad)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Column Base -->
      <path d="M 216 380 L 296 380" stroke-width="12" />
      <path d="M 236 368 L 276 368" stroke-width="8" />
      <!-- Column Shaft -->
      <line x1="256" y1="368" x2="256" y2="140" stroke-width="10" />
      <!-- Column Top Finial -->
      <circle cx="256" cy="130" r="12" fill="url(#goldGrad)" stroke="none" />
    </g>

    <!-- Scale Beam (The horizontal bar) -->
    <path d="M 136 180 Q 256 160 376 180" fill="none" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round" id="balance-beam" filter="url(#glow)" />
    
    <!-- Left Plate Strings & Plate -->
    <g id="left-plate">
      <line x1="136" y1="180" x2="106" y2="270" stroke="url(#silverGrad)" stroke-width="2" opacity="0.8" />
      <line x1="136" y1="180" x2="166" y2="270" stroke="url(#silverGrad)" stroke-width="2" opacity="0.8" />
      <!-- Plate -->
      <path d="M 96 270 Q 136 285 176 270" fill="none" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round" />
      <path d="M 96 270 C 96 295 176 295 176 270 Z" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="3" opacity="0.9" />
    </g>

    <!-- Right Plate Strings & Plate -->
    <g id="right-plate">
      <line x1="376" y1="180" x2="346" y2="270" stroke="url(#silverGrad)" stroke-width="2" opacity="0.8" />
      <line x1="376" y1="180" x2="406" y2="270" stroke="url(#silverGrad)" stroke-width="2" opacity="0.8" />
      <!-- Plate -->
      <path d="M 336 270 Q 376 285 416 270" fill="none" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round" />
      <path d="M 336 270 C 336 295 416 295 416 270 Z" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="3" opacity="0.9" />
    </g>

    <!-- Stylized Handshake (The Union/Agreement Emblem) centered in the middle of the column -->
    <g id="handshake" transform="translate(186, 280) scale(0.28)" filter="url(#glow)">
      <!-- Outer Ring of Union -->
      <circle cx="250" cy="250" r="190" fill="#0f172a" stroke="url(#goldGrad)" stroke-width="12" />
      
      <!-- Handshake Vector Paths -->
      <path d="M 120 280 L 170 230 C 185 215 210 215 225 230 L 250 255 L 290 215 C 305 200 330 200 345 215 L 400 270" 
            fill="none" stroke="url(#silverGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 140 250 L 190 200 C 205 185 230 185 245 200 L 270 225 L 310 185 C 325 170 350 170 365 185 L 390 210" 
            fill="none" stroke="url(#silverGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
      <circle cx="250" cy="250" r="25" fill="url(#goldGrad)" />
    </g>
  </g>

  <!-- Elegant Brand Typography at the bottom -->
  <text x="256" y="445" font-family="'Inter', 'Space Grotesk', 'Montserrat', sans-serif" font-size="28" font-weight="900" fill="url(#goldGrad)" letter-spacing="8" text-anchor="middle">GSA CÂMARA</text>
  <text x="256" y="472" font-family="'Inter', 'Space Grotesk', sans-serif" font-size="12" font-weight="700" fill="url(#silverGrad)" letter-spacing="3" text-anchor="middle" opacity="0.8">MEDIAÇÃO &amp; CONCILIAÇÃO</text>
</svg>
